name: Sync Apache Doris Mirror

on:
  schedule:
    - cron: "0 0 * * *" # Daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-doris
  cancel-in-progress: true

jobs:
  sync-fork:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout mirror repo
        uses: actions/checkout@v4
        with:
          repository: chance-spatial/doris-mirror
          token: ${{ secrets.GITHUB_TOKEN }}
          path: doris-mirror
          fetch-depth: 0

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail
          cd doris-mirror
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git config pull.rebase false

      - name: Add upstream and discover refs to sync
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          cd doris-mirror

          git remote remove upstream >/dev/null 2>&1 || true
          git remote add upstream https://github.com/apache/doris.git

          BRANCHES="$(
            {
              git ls-remote --heads upstream 'refs/heads/branch-4.*'
              git ls-remote --heads upstream 'refs/heads/branch-5.*'
            } | awk '{print $2}' | sed 's#refs/heads/##' | sort -uV
          )"

          if [ -n "${BRANCHES}" ]; then
            printf "%s\n" ${BRANCHES} > .branches
            echo "branch_list=$(paste -sd, .branches)" >> "$GITHUB_OUTPUT"
          else
            echo "branch_list=" >> "$GITHUB_OUTPUT"
          fi

      - name: Preserve this repo's sync workflow
        shell: bash
        run: |
          set -euo pipefail
          cd doris-mirror
          mkdir -p /tmp/doris-mirror-workflows
          if [ -f .github/workflows/sync-doris.yml ]; then
            cp .github/workflows/sync-doris.yml /tmp/doris-mirror-workflows/sync-doris.yml
          fi

      - name: Sync branches (branch-4.* and branch-5.*)
        if: steps.discover.outputs.branch_list != ''
        shell: bash
        run: |
          set -euo pipefail
          cd doris-mirror

          IFS=',' read -ra BRS <<< "${{ steps.discover.outputs.branch_list }}"
          for BR in "${BRS[@]}"; do
            echo "==> Syncing branch: $BR"

            git fetch --prune upstream "$BR"
            git checkout -B "$BR" FETCH_HEAD
            git reset --hard FETCH_HEAD

            rm -rf .github/workflows
            mkdir -p .github/workflows

            if [ -f /tmp/doris-mirror-workflows/sync-doris.yml ]; then
              cp /tmp/doris-mirror-workflows/sync-doris.yml .github/workflows/sync-doris.yml
            fi

            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "Strip upstream GitHub workflows"
            fi

            git push origin "$BR" --force
          done

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cd doris-mirror
          git remote remove upstream || true
